<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#351707">

  <title>Engagement COE Presents | 2026 First Half Recap</title>
  <meta name="description" content="Engagement COE presents the 2026 First Half Recap.">

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="page">
    <section class="poster" aria-label="Engagement COE 2026 First Half Recap">
      <img
        class="poster-art"
        src="assets/recap-board.png"
        alt="Engagement COE 2026 First Half Recap memory board">

      <div class="video-slot">
        <video
          id="recapVideo"
          controls
          playsinline
          preload="metadata"
          poster="assets/recap-board.png">
          <source src="recap.mp4" type="video/mp4">
          <source
            src="https://drive.google.com/uc?export=download&id=1xE4toVQX19mGaeeddwOBAWCsrJg2a-U_"
            type="video/mp4">
          Your browser does not support HTML5 video.
        </video>
      </div>

      <button class="play-recap" id="playRecap" type="button">
        <span>▶</span>
        Play Recap
      </button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
